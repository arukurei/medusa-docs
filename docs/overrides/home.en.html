{% extends "main.html" %}

{% block tabs %}
  {{ super() }}

  <!-- Additional styles for landing page -->
  <style>
    .md-header{position:initial}
    .md-main__inner{margin:0}
    .md-content{display:none}
    @media screen and (min-width:60em){.md-sidebar--secondary{display:none}}
    @media screen and (min-width:76.25em){.md-sidebar--primary{display:none}}
  </style>

  <!-- Hero for landing page -->
  <section class="mdx-container">
    <div class="md-grid md-typeset">
      <div class="mdx-hero">
        <div class="mdx-hero__image">
            <img src="{{ 'assets/images/Logo.png' | url }}" alt="" width="400" height="400" draggable="false">
        </div>

        <div class="mdx-hero__content">
          <h1>Medusa — High-performance framework for graphs and skill trees</h1>
          <p>Design dynamic UI graphs and interactive progression webs in Godot.</p>

          <a href="{{ 'getting-started/getting_started/' | url }}"
             title="{{ page.next_page.title | e }}"
             class="md-button md-button--primary">
            Get Started
          </a>
          <a href="{{ 'references/data/data' | url }}"
             title="Data"
             class="md-button">
            Node Reference
          </a>
        </div>
      </div>
    </div>
  </section>
{% endblock %}

<!-- Content -->
{% block content %}{% endblock %}
<!-- Application footer -->
{% block footer %}{% endblock %}
